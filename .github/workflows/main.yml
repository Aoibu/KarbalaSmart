name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. جلب الكود من المستودع
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. إعداد إصدار الجافا (مهم جداً لمشاريع أندرويد الحديثة)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. إعداد بيئة Gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. إعطاء صلاحية التنفيذ لملف gradlew
    - name: Make gradlew executable
      run: chmod +x gradlew

    # 5. بناء التطبيق (استخدام :app:assembleDebug يحل مشكلة عدم العثور على المهمة)
    - name: Build with Gradle
      run: ./gradlew :app:assembleDebug

    # 6. رفع ملف الـ APK الناتج كملف قابل للتحميل
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartKarbala-APK
        path: app/build/outputs/apk/debug/*.apk
