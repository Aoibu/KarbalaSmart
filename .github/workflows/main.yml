      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # بدلاً من خطوة chmod التي فشلت، أضف هذه:
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ثم قم بالبناء باستخدام أمر gradle المباشر
      - name: Build with Gradle
        run: gradle build 
